name: spacenews_core
description: SpaceNews Core - Advanced International News Portal (Remedial PAB)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Backend & Storage sesuai ketentuan soal
  firebase_core: ^2.27.0
  firebase_auth: ^4.19.5
  cloud_firestore: ^4.17.4
  shared_preferences: ^2.2.3

  # Networking ke REST API spaceflightnewsapi
  http: ^1.2.1

  # Format tanggal sederhana untuk artikel
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg